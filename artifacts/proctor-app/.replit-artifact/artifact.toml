kind = "web"
previewPath = "/"
title = "AI Proctoring System"
version = "1.0.0"
id = "artifacts/proctor-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24713

[services.development]
run = "pnpm --filter @workspace/proctor-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proctor-app", "run", "build" ]
publicDir = "artifacts/proctor-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24713"
BASE_PATH = "/"
